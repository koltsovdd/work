server {
    listen 80;
    server_name 204-168-132-11.sslip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 204-168-132-11.sslip.io;

    ssl_certificate     /etc/letsencrypt/live/204-168-132-11.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/204-168-132-11.sslip.io/privkey.pem;

    client_max_body_size 10M;

    resolver 127.0.0.11 valid=10s;

    location /static/ {
        alias /app/static/;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        set $upstream http://web:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
