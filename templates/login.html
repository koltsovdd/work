{% extends "base.html" %}
{% block title %}Вхід{% endblock %}

{% block content %}
<section class="card auth-card">
    <div class="card-header">
        <h2>Вхід</h2>
    </div>

    <form method="post" class="work-form">
        <div class="form-grid form-grid--single">
            <label class="form-field">
                <span class="field-label">Email <span class="req">*</span></span>
                <input type="email" name="email" value="{{ form_data.get('email', '') }}" required autofocus placeholder="you@example.com">
            </label>

            <label class="form-field">
                <span class="field-label">Пароль <span class="req">*</span></span>
                <input type="password" name="password" required placeholder="Введіть пароль">
            </label>
        </div>

        <div class="actions">
            <button type="submit" class="btn" data-submitting>Увійти</button>
            <a href="{{ url_for('register') }}" class="btn secondary">Реєстрація</a>
        </div>
    </form>
</section>
{% endblock %}
