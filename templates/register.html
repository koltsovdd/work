{% extends "base.html" %}
{% block title %}Реєстрація{% endblock %}

{% block content %}
<section class="card auth-card">
    <div class="card-header">
        <h2>Реєстрація</h2>
    </div>

    <form method="post" class="work-form">
        <div class="form-grid form-grid--single">
            <label class="form-field">
                <span class="field-label">Email <span class="req">*</span></span>
                <input type="email" name="email" value="{{ form_data.get('email', '') }}" required autofocus placeholder="you@example.com">
            </label>

            <label class="form-field">
                <span class="field-label">Ім'я <span class="req">*</span></span>
                <input type="text" name="name" value="{{ form_data.get('name', '') }}" required placeholder="Ваше ім'я">
            </label>

            <label class="form-field">
                <span class="field-label">Пароль <span class="req">*</span></span>
                <input type="password" name="password" required placeholder="Мінімум 6 символів">
            </label>

            <label class="form-field">
                <span class="field-label">Пароль ще раз <span class="req">*</span></span>
                <input type="password" name="password2" required placeholder="Повторіть пароль">
            </label>
        </div>

        <div class="actions">
            <button type="submit" class="btn" data-submitting>Зареєструватись</button>
            <a href="{{ url_for('login') }}" class="btn secondary">Вже є акаунт</a>
        </div>
    </form>
</section>
{% endblock %}
