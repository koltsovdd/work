{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<section class="card auth-card">
    <div class="card-header">
        <h2>Регистрация</h2>
    </div>

    <form method="post" class="work-form">
        <div class="form-grid form-grid--single">
            <label class="form-field">
                <span class="field-label">Email <span class="req">*</span></span>
                <input type="email" name="email" value="{{ form_data.get('email', '') }}" required autofocus placeholder="you@example.com">
            </label>

            <label class="form-field">
                <span class="field-label">Имя <span class="req">*</span></span>
                <input type="text" name="name" value="{{ form_data.get('name', '') }}" required placeholder="Ваше имя">
            </label>

            <label class="form-field">
                <span class="field-label">Пароль <span class="req">*</span></span>
                <input type="password" name="password" required placeholder="Минимум 6 символов">
            </label>

            <label class="form-field">
                <span class="field-label">Пароль ещё раз <span class="req">*</span></span>
                <input type="password" name="password2" required placeholder="Повторите пароль">
            </label>
        </div>

        <div class="actions">
            <button type="submit" class="btn" data-submitting>Зарегистрироваться</button>
            <a href="{{ url_for('login') }}" class="btn secondary">Уже есть аккаунт</a>
        </div>
    </form>
</section>
{% endblock %}
